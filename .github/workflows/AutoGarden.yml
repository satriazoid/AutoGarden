Name: AutoGarden 🌿

on:
  schedule:
    # Berjalan setiap 2 jam agar tidak terlalu "robotik" setiap jam tepat
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  cultivate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Gardening Loop
        run: |
            git config --global user.name "satriazoid"
            git config --global user.email "satriaalfa77@gmail.com"
            
            git fetch origin main
            git reset --hard origin/main
        
            export TZ="Asia/Jakarta"
            HOUR=$(date +%H)
            
            # 🎯 1. Jam Operasional Manusia (07:00 - 23:00)
            # Di luar jam ini, kemungkinan aktif hanya 5% (biar ada lembur sesekali)
            if [ "$HOUR" -lt 7 ] || [ "$HOUR" -gt 23 ]; then
              LATE_NIGHT=$(( RANDOM % 100 ))
              if [ "$LATE_NIGHT" -gt 5 ]; then
                echo "Sleeping time... 😴"
                exit 0
              fi
            fi

            # 🎯 2. Probabilitas Per Sesi (Total target ~7-10 commit/hari)
            # Karena script jalan tiap 2 jam, kita buat probabilitas aktif 70% 
            # agar target mingguan >50 aman tercapai.
            ACTIVE_CHECK=$(( RANDOM % 100 ))
            if [ "$ACTIVE_CHECK" -gt 70 ]; then
              echo "Taking a short break ☕"
              exit 0
            fi

            # 🎯 3. Penentuan Jumlah Commit per Sesi
            # Kita gunakan rentang kecil agar total harian terakumulasi natural
            ROLL=$(( RANDOM % 100 ))
            if [ "$ROLL" -lt 60 ]; then
              ITERATIONS=$(( ( RANDOM % 2 ) + 1 ))   # 1-2 commit (rutin)
            elif [ "$ROLL" -lt 90 ]; then
              ITERATIONS=$(( ( RANDOM % 3 ) + 2 ))   # 2-4 commit (aktif)
            else
              ITERATIONS=5                           # Sprint kecil
            fi

            echo "Current Hour: $HOUR | Commits this session: $ITERATIONS"
        
            for ((i=1; i<=ITERATIONS; i++))
            do
              # Random delay antara commit (1-120 detik) agar timestamp tidak dempet
              sleep $(( ( RANDOM % 120 ) + 1 ))

              echo "Growth log: $(date '+%Y-%m-%d %H:%M:%S') - Step $i" > garden_log.txt
              
              git add garden_log.txt
              # Menggunakan pesan commit yang bervariasi agar tidak terlihat spam
              MESSAGES=("feat: update garden logic 🌿" "fix: pruning dead leaves ✂️" "docs: water plants 💧" "chore: soil maintenance 🌱" "refactor: sun exposure optimization ☀️")
              SELECTED_MSG=${MESSAGES[$RANDOM % ${#MESSAGES[@]}]}
              
              git commit -m "$SELECTED_MSG"
            done

            git push origin main