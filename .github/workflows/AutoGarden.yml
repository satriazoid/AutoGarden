name: AutoGarden 🌿

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  cultivate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Auto Gardening System
        run: |
          git config user.name "satriazoid"
          git config user.email "satriazoid@users.noreply.github.com"

          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}

          git config --list

          git fetch origin main
          git reset --hard origin/main

          export TZ="Asia/Jakarta"
          HOUR=$(date +%H)
          DAY=$(date +%u) # 1=Senin ... 7=Minggu

          # =========================
          # 🎯 TARGET HARIAN (MIN 10)
          # =========================
          case $DAY in
            1) TARGET=12 ;;
            2) TARGET=14 ;;
            3) TARGET=15 ;;
            4) TARGET=17 ;;
            5) TARGET=20 ;;
            6) TARGET=12 ;;
            7) TARGET=10 ;;
          esac

          echo "Target today: $TARGET"

          # =========================
          # 📊 HITUNG COMMIT HARI INI
          # =========================
          TODAY=$(date '+%Y-%m-%d')
          COUNT=$(git log --since="$TODAY 00:00:00" --until="$TODAY 23:59:59" --pretty=oneline | wc -l)

          echo "Current commits: $COUNT"

          if [ "$COUNT" -ge "$TARGET" ]; then
            echo "Target reached, resting 🌙"
            exit 0
          fi

          REMAIN=$(( TARGET - COUNT ))

          # =========================
          # 🕒 JAM MANUSIA
          # =========================
          if [ "$HOUR" -lt 7 ] || [ "$HOUR" -gt 23 ]; then
            NIGHT_CHANCE=$(( RANDOM % 100 ))
            if [ "$NIGHT_CHANCE" -gt 30 ]; then
              echo "Sleeping time 😴"
              exit 0
            fi
          fi

          # =========================
          # 🔁 JUMLAH COMMIT SESI
          # =========================
          if [ "$REMAIN" -le 2 ]; then
            ITERATIONS=1
          elif [ "$REMAIN" -le 5 ]; then
            ITERATIONS=$(( ( RANDOM % 2 ) + 1 ))
          else
            ITERATIONS=$(( ( RANDOM % 3 ) + 2 ))
          fi

          # Jangan lebih dari sisa target
          if [ "$ITERATIONS" -gt "$REMAIN" ]; then
            ITERATIONS=$REMAIN
          fi

          echo "Hour: $HOUR | Remaining: $REMAIN | This session: $ITERATIONS"

          # =========================
          # 🌱 LOOP COMMIT
          # =========================
          for ((i=1; i<=ITERATIONS; i++))
          do
            sleep $(( ( RANDOM % 90 ) + 30 ))

            echo "Growth log: $(date '+%Y-%m-%d %H:%M:%S') - Step $i - $RANDOM" > garden_log.txt

            git add garden_log.txt

            MESSAGES=(
              "feat: update garden logic 🌿"
              "fix: pruning dead leaves ✂️"
              "docs: water plants 💧"
              "chore: soil maintenance 🌱"
              "refactor: sun exposure optimization ☀️"
              "style: adjust plant spacing 🌾"
              "perf: improve growth speed 🚀"
            )

            MSG=${MESSAGES[$RANDOM % ${#MESSAGES[@]}]}

            # commit hanya jika ada perubahan
            if ! git diff --cached --quiet; then
              git commit -m "$MSG"
            fi
          done

          # =========================
          # 🚀 PUSH AMAN (ANTI ERROR 128)
          # =========================
          git pull --rebase origin main
          git push origin main